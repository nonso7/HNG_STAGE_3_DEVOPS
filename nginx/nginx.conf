user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format detector '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log detector;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=basic:10m rate=20r/s;

    server {
        listen 80 default_server;
        server_name _;

        location / {
            limit_req zone=basic burst=40 nodelay;
            root /var/www/html;
            index index.html;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
        }
    }
}

nginx:
  access_log: /var/log/nginx/access.log
  error_log: /var/log/nginx/error.log

baseline:
  window_seconds: 300
  refresh_seconds: 60
  min_samples: 100

detector:
  rps_multiplier: 5.0
  error_rate_threshold: 0.4
  unique_path_threshold: 50
  evaluation_interval_seconds: 5

blocker:
  backend: iptables
  chain: DDOS_BLOCK
  ban_duration_seconds: 900
  whitelist:
    - 127.0.0.1
    - 10.0.0.0/8

notifier:
  enabled: true
  channel: webhook
  webhook_url: ""
  min_severity: warning

dashboard:
  host: 0.0.0.0
  port: 8080

storage:
  state_file: ./state.json
